<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador 2060</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="../../index.html" class="back-link">← Início</a>
        <h1 class="title">Temporizador <span class="accent">2060</span></h1>
        <div class="input-group">
            <input type="number" id="hours" placeholder="00" min="0" max="99">
            <span>:</span>
            <input type="number" id="minutes" placeholder="00" min="0" max="59">
            <span>:</span>
            <input type="number" id="seconds" placeholder="00" min="0" max="59">
        </div>
        <div class="circle-wrap">
            <canvas id="progressCanvas" width="220" height="220"></canvas>
            <div class="time-display" id="display">00:00:00</div>
        </div>
        <div class="controls">
            <button id="startBtn" class="btn">Iniciar</button>
            <button id="pauseBtn" class="btn">Pausar</button>
            <button id="resetBtn" class="btn">Resetar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
